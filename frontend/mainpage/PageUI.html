<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Cloud >.< </title>
            <meta name="description" content="A sleek, modern cloud storage interface.">
            <link rel="stylesheet" href="Style1.css">

            <!--Font -->
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=VT323&display=swap"
                rel="stylesheet">

            <!--Symbol-->
            <link
                href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
                rel="stylesheet" />
</head>

<body>
    <div class="main-page">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <img src="assets/nova_logo.png" class="brand-logo">
                <span class="brand-text">Sakura Cloud</span>
            </div>

            <button class="btn-new">
                <span class="material-symbols-rounded">add</span>
                New
            </button>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <span class="material-symbols-rounded">home</span>
                    <span class="nav-text">Home</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-symbols-rounded">folder</span>
                    <span class="nav-text">My Files</span>
                </a>
                <a href="#" class="nav-item">
                    <span class="material-symbols-rounded">delete</span>
                    <span class="nav-text">Trash</span>
                </a>
            </nav>

            <div class="storage">
                <div class="storage-header">
                    <span class="material-symbols-rounded">cloud</span>
                    <span class="storage-title">Storage</span>
                </div>
                <div class="progress-bar">
                    <div class="progress" style="width: 75%;"></div>
                </div>
                <div class="storage-info">11.25 GB of 15 GB used</div>
                <button class="btn-upgrade">Upgrade Storage</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="top-header">
                <div class="search-bar">
                    <span class="material-symbols-rounded search-icon">search</span>
                    <input type="text" placeholder="Search in Drive...">
                    <span class="material-symbols-rounded filter-icon">tune</span>
                </div>

                <div class="header-actions">
                    <button class="icon-btn" title="Offline preview">
                        <span class="material-symbols-rounded">offline_pin</span>
                    </button>
                    <button class="icon-btn" title="Help">
                        <span class="material-symbols-rounded">help</span>
                    </button>
                    <button class="icon-btn" title="Settings">
                        <span class="material-symbols-rounded">settings</span>
                    </button>
                    <div class="profile-pic">
                        <span>AN</span>
                    </div>
                </div>
            </header>

            <!-- Dashboard Content -->
            <div class="content-board">
                <h1>Welcome Back, An!</h1>


                <section class="section">
                    <div class="file-list">
                        <div class="list-item">
                            <div class="col-name">
                                <span class="material-symbols-rounded icon-doc">description</span>
                                <span>Project Proposal.docx</span>
                            </div>
                            <span class="col-owner">me</span>
                            <span class="col-date">Mar 24, 2026</span>
                            <span class="col-size">24 KB</span>
                            <button class="list-action"><span class="material-symbols-rounded">more_vert</span></button>
                        </div>
                        <div class="list-item">
                            <div class="col-name">
                                <span class="material-symbols-rounded icon-sheet">table_chart</span>
                                <span>TopSecret.xlsx</span>
                            </div>
                            <span class="col-owner">An</span>
                            <span class="col-date">Mar 23, 2026</span>
                            <span class="col-size">1.2 MB</span>
                            <button class="list-action"><span class="material-symbols-rounded">more_vert</span></button>
                        </div>
                        <div class="list-item">
                            <div class="col-name">
                                <span class="material-symbols-rounded icon-slide">slideshow</span>
                                <span>Hello.pptx</span>
                            </div>
                            <span class="col-owner">me</span>
                            <span class="col-date">Mar 20, 2026</span>
                            <span class="col-size">15 MB</span>
                            <button class="list-action"><span class="material-symbols-rounded">more_vert</span></button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>
</body>

</html>
